{% ke_thua "trangmacdinh.html" %}
{% khoi noi_dung %}
<section class="hero">
  <div class="container">
    <p class="hero-eyebrow">Dự án</p>
    <h1>Dự án</h1>
    <p class="hero-lede">Những dự án mà mình đang theo đuổi để cuộc sống của một phàm nhân bớt rảnh rỗi hơn :)).</p>
  </div>
</section>
<section class="section">
  <div class="container project-grid">
    {% moi p trong danh_sach_du_an %}
    <div class="project-card">
      <div class="project-thumb"><img src="{{ cau_hinh.baseurl }}{{ p.anh_dai_dien }}" alt="" loading="lazy"></div>
      <div class="project-body">
        <h3>{{ p.tieu_de }}</h3>
        <p class="post-desc">{{ p.mo_ta_ngan }}</p>
        <ul class="stack-list">{{ p.cong_nghe_html }}</ul>
        <div class="project-links">
          <a class="btn" href="{{ cau_hinh.baseurl }}{{ p.url }}">Chi tiết</a>
          <a class="btn" href="{{ p.link_github }}" target="_blank" rel="noopener">GitHub</a>
        </div>
      </div>
    </div>
    {% het %}
  </div>
</section>
{% end %}
