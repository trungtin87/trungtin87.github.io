<!DOCTYPE html>
<html lang="{{ cau_hinh.ngon_ngu }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ tieu_de_trang }}</title>
<meta name="description" content="{{ cau_hinh.mo_ta }}">
<meta name="keywords" content="{{ cau_hinh.ten_trangweb }}, {{ cau_hinh.bi_danh }}, Đạo giáo, Vô vi, Âm Dương, Tự nhiên, blog kỹ thuật, thư phòng số, {{ cau_hinh.tac_gia }}">
<meta name="author" content="{{ cau_hinh.tac_gia }}">
<link rel="icon" type="image/svg+xml" href="{{ cau_hinh.baseurl }}/tainguyen/hinhanh/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="{{ cau_hinh.baseurl }}/tainguyen/hinhanh/favicon-32.png">
<link rel="apple-touch-icon" href="{{ cau_hinh.baseurl }}/tainguyen/hinhanh/apple-touch-icon.png">
<link rel="manifest" href="{{ cau_hinh.baseurl }}/manifest.webmanifest">
<meta name="theme-color" content="{{ cau_hinh.mau_giao_dien }}">

{{ the_seo }}
<meta property="og:site_name" content="{{ cau_hinh.ten_trangweb }}">
<meta property="og:locale" content="vi_VN">

<link rel="alternate" type="application/rss+xml" title="{{ cau_hinh.ten_trangweb }} — RSS" href="{{ cau_hinh.baseurl }}/rss.xml">
<link rel="stylesheet" href="{{ cau_hinh.baseurl }}/tainguyen/css/main.css">
<script>
  (function () {
    var t = localStorage.getItem("hktq-theme");
    if (t) document.documentElement.setAttribute("data-theme", t);
  })();
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ cau_hinh.ten_trangweb }}",
  "alternateName": "{{ cau_hinh.bi_danh }}",
  "url": "{{ cau_hinh.url }}/",
  "author": { "@type": "Person", "name": "{{ cau_hinh.tac_gia }}" },
  "description": "{{ cau_hinh.mo_ta }}"
}
</script>
</head>
<body>
<div class="site">
  {% nhung "phandautrang.html" %}
  {% nhung "thanhdieuhuong.html" %}

  <main id="main">
    {% khoi noi_dung %}
    <p>Trang chưa có nội dung.</p>
    {% end %}
  </main>

  {% nhung "phanchantrang.html" %}
</div>
<script type="module" src="{{ cau_hinh.baseurl }}/tainguyen/js/main.js"></script>
</body>
</html>
