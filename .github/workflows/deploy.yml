name: Build và Deploy VNSITE lên GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cài thư viện phụ thuộc
        run: pip install -r requirements.txt

      - name: Build website (python taowebsite.py build)
        run: python taowebsite.py build

      - name: Cấu hình GitHub Pages
        uses: actions/configure-pages@v5

      - name: Đóng gói kết quả build (_ketqua/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_ketqua"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
